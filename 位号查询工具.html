<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM位号查询工具</title>
    
    <!-- 性能优化：DNS 预解析和预连接 -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <!-- 性能优化：异步加载非关键脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    
    <!-- 通用样式 -->
    <link rel="preload" href="assets/css/common.css" as="style">
    <link href="assets/css/common.css" rel="stylesheet">
    
    <style>
        /* ========================================
           页面特定样式 - Design-Taste-Frontend 优化版
           ======================================== */
        
        /* 主料/替代料颜色 */
        .primary-material { 
            color: #7A9B76; 
            font-weight: 700; 
        }
        .alternative-material { 
            color: var(--primary-color); 
            font-weight: 700; 
        }
        
        /* 自定义状态栏 - 液态玻璃 */
        .status-bar-custom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border-light);
            padding: 12px 30px;
            font-size: 13px;
            color: var(--text-secondary);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 100;
            transition: all 0.3s var(--ease-smooth);
        }
        
        .status-bar-custom::before {
            content: '';
            position: absolute;
            inset: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        
        /* 带图标的表单控件 */
        .form-control-with-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-light);
            min-height: 48px;
            padding: 0 16px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            border: 1.5px solid var(--border-color);
            border-right: none;
            transition: all 0.25s var(--ease-smooth);
        }
        
        .form-control-with-icon svg {
            color: var(--text-muted);
            transition: color 0.25s var(--ease-smooth);
            flex-shrink: 0;
        }
        
        .form-control-with-icon:focus-within {
            background: white;
            border-color: var(--primary-color);
        }
        
        .form-control-with-icon:focus-within svg {
            color: var(--primary-color);
        }
        
        /* 料号输入行 */
        .part-number-row {
            animation: slideInRow 0.4s var(--ease-spring);
        }
        
        @keyframes slideInRow {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* 输入组按钮优化 */
        .part-number-row .btn-add,
        .part-number-row .btn-remove {
            padding: 12px;
            transition: all 0.2s var(--ease-spring);
        }
        
        .part-number-row .btn-add:hover {
            transform: scale(1.05);
            background: var(--success-light);
            border-color: var(--success-color);
            color: var(--success-color);
        }
        
        .part-number-row .btn-remove:hover {
            transform: scale(1.05);
            background: var(--danger-light);
            border-color: var(--danger-color);
            color: var(--danger-color);
        }
        
        /* 添加料号按钮 */
        #addPartBtn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: 1.5px dashed var(--border-dark);
            color: var(--text-muted);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease-spring);
        }
        
        #addPartBtn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-soft);
            transform: translateY(-1px);
        }
        
        #addPartBtn svg {
            transition: transform 0.3s var(--ease-spring);
        }
        
        #addPartBtn:hover svg {
            transform: rotate(90deg);
        }
        
        /* 性能优化：结果卡片动画 - 使用 GPU 加速 */
        #resultCard {
            animation: expandCard 0.5s var(--ease-spring);
            /* 性能优化：启用 GPU 加速 */
            transform: translateZ(0);
            will-change: transform, opacity;
        }
        
        /* 性能优化：使用 translate3d 启用 GPU 加速 */
        @keyframes expandCard {
            from {
                opacity: 0;
                transform: scale(0.98) translate3d(0, 10px, 0);
            }
            to {
                opacity: 1;
                transform: scale(1) translate3d(0, 0, 0);
            }
        }
        
        /* 结果详情卡片增强 */
        .result-details {
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-color) 100%);
            border-left: 4px solid var(--primary-color);
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s var(--ease-spring);
            position: relative;
            overflow: hidden;
        }
        
        .result-details::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary-alpha-10) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .result-details:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }
        
        .result-details h4 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .result-details h4::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color) 0%, transparent 100%);
            margin-left: 8px;
        }
        
        /* 详情行优化 */
        .detail-row {
            display: flex;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }
        
        .detail-row:hover {
            background: var(--primary-alpha-10);
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
            border-radius: var(--radius-sm);
        }
        
        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .detail-label {
            font-weight: 600;
            min-width: 140px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .detail-value {
            flex: 1;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        /* 性能优化：表格行 - 减少重绘 */
        .data-table tbody tr {
            transition: background-color 0.15s ease;
            /* 性能优化：限制渲染范围 */
            contain: layout style;
        }
        
        .data-table tbody tr:hover {
            background: var(--primary-alpha-10);
            /* 性能优化：移除 transform 减少重绘 */
            box-shadow: var(--shadow-xs);
        }
        
        /* 文件结构信息 */
        .file-structure-info {
            background: linear-gradient(135deg, var(--info-light) 0%, #F0F5F7 100%);
            border: 1px solid rgba(122, 155, 168, 0.3);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--info-color);
            line-height: 1.8;
        }
        
        /* 警告图标替换 emoji */
        .warning-icon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--warning-color);
        }
        
        .warning-icon svg {
            width: 14px;
            height: 14px;
        }
        
        /* 文件上传区域 - 居中拖拽样式 */
        .file-upload-center {
            border: 2px dashed var(--border-dark);
            border-radius: var(--radius-xl);
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s var(--ease-spring);
            position: relative;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-color) 100%);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .file-upload-center:hover, .file-upload-center.dragover {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, var(--primary-soft) 0%, var(--bg-light) 100%);
            box-shadow: var(--shadow-md);
            transform: scale(1.01);
        }
        
        .file-upload-center input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-upload-center .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            color: var(--primary-light);
            transition: all 0.4s var(--ease-spring);
        }
        
        .file-upload-center:hover .upload-icon {
            color: var(--primary-color);
            transform: translateY(-4px);
        }
        
        .file-upload-center .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }
        
        .file-upload-center:hover .upload-text {
            color: var(--primary-dark);
        }
        
        .file-upload-center .upload-hint {
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        
        /* 提示文字 */
        .hint-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
        }
        
        .hint-text svg {
            flex-shrink: 0;
            color: var(--warning-color);
        }
        
        /* 响应式优化 */
        @media (max-width: 768px) {
            .form-control-with-icon {
                border-radius: var(--radius-md);
                border-right: 1.5px solid var(--border-color);
                margin-bottom: 8px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group .btn {
                border-radius: var(--radius-md);
                width: 100%;
            }
            
            .part-number-row {
                flex-wrap: wrap;
            }
            
            .part-number-row .form-control {
                border-radius: var(--radius-md);
                margin-bottom: 8px;
            }
            
            .part-number-row .btn-add,
            .part-number-row .btn-remove {
                border-radius: var(--radius-md);
                flex: 1;
            }
            
            .detail-label {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>

<div class="container-narrow">
    <!-- 页面头部 -->
    <header class="page-header">
        <h1>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            BOM位号查询工具
        </h1>
        <p class="subtitle" style="text-align: center;">根据硬件BOM查询料号对应位号，自动关联替代料</p>
        <div class="nav-btn-group">
            <a href="index.html" class="btn-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                返回首页
            </a>
        </div>
    </header>

    <!-- 文件选择区域 -->
    <div class="card card-border-primary">
        <div class="card-header">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                </svg>
                选择Excel文件
            </h3>
        </div>
        <div class="card-body">
            <label class="file-upload-center" id="dropZone">
                <input type="file" id="fileInput" accept=".xlsx, .xls">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <div class="upload-text" id="uploadText">点击或拖拽 Excel 文件到这里</div>
                <div class="upload-hint">支持 .xlsx 和 .xls 格式</div>
                <div id="fileInfo" class="file-info-custom" style="display:none; margin-top:16px;"></div>
            </label>
            <div id="fileStructureInfo"></div>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-secondary" id="clearBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                    清空结果
                </button>
                <button class="btn btn-outline" id="sampleBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                    显示示例
                </button>
            </div>
        </div>
    </div>

    <!-- 查询区域 -->
    <div class="card card-border-secondary">
        <div class="card-header">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zM5 8h2v2H5V8zm0 3h2v2H5v-2zm12 6H7v-2h10v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2z"/>
                </svg>
                输入料号查询
            </h3>
        </div>
        <div class="card-body">
            <div id="partNumberInputs">
                <div class="input-group mb-2 part-number-row">
                    <input type="text" class="form-control part-number-input" placeholder="请输入料号（如：HQ134050003N0）">
                    <button class="btn btn-secondary btn-add" type="button" title="添加料号">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </button>
                    <button class="btn btn-danger btn-remove" type="button" title="删除" style="display:none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn btn-sm" id="addPartBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                添加料号
            </button>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-success flex-1" id="searchBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    批量查询
                </button>
                <button class="btn btn-secondary" id="clearInputBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    清空
                </button>
            </div>
            <div class="hint-text">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 21c0 .5.4 1 1 1h4c.6 0 1-.5 1-1v-1H9v1zm3-19C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .5.4 1 1 1h6c.6 0 1-.5 1-1v-2.3c1.8-1.3 3-3.4 3-5.7 0-3.9-3.1-7-7-7z"/>
                </svg>
                支持主料和替代料查询，可同时查询多个料号
            </div>
        </div>
    </div>

    <!-- 结果区域 -->
    <div class="card d-none" id="resultCard">
        <div class="card-header">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z"/>
                </svg>
                查询结果
            </h3>
        </div>
        <div class="card-body">
            <div class="loading text-center py-4 d-none" id="loading">
                <div class="spinner mb-2"></div>
                <div class="text-muted">正在查询，请稍候...</div>
            </div>
            <div id="resultContainer">
                <div id="resultArea"></div>
                <div class="table-container mt-3">
                    <table class="data-table" id="resultTable">
                        <thead>
                            <tr>
                                <th style="width:80px;">序号</th>
                                <th style="width:180px;">料号</th>
                                <th style="width:100px;">替代关系</th>
                                <th>物料描述</th>
                                <th style="width:150px;">位号</th>
                                <th style="width:80px;">行号</th>
                            </tr>
                        </thead>
                        <tbody id="resultTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar-custom" id="statusBar">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:6px;color:var(--text-muted);">
            <circle cx="12" cy="12" r="12"/>
        </svg>
        就绪 - 请先选择Excel文件
    </div>

    <!-- 使用说明 -->
    <div class="alert alert-info mt-4 mb-5">
        <div class="alert-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
        </div>
        <div class="alert-content">
            <strong>使用说明：</strong>
            <ul style="margin: 10px 0 0 20px; padding: 0;">
                <li>可实现根据硬件BOM查询料号对应位号，并自动查询替代料对应主料位号</li>
                <li>支持Excel文件（.xlsx 或 .xls格式），自动识别表头位置</li>
                <li>必需包含"料号"、"替代关系"、"位号"三列，"物料描述"列可选</li>
                <li>所有数据处理均在本地完成，不上传到任何服务器</li>
            </ul>
        </div>
    </div>
</div>

<!-- 通用JS -->
<script src="assets/js/common.js"></script>

<script>
/**
 * BOM查询工具类
 */
class BOMQueryTool {
    constructor() {
        this.excelData = null;
        this.fileInput = document.getElementById('fileInput');
        this.dropZone = document.getElementById('dropZone');
        this.uploadText = document.getElementById('uploadText');
        this.fileInfo = document.getElementById('fileInfo');
        this.searchBtn = document.getElementById('searchBtn');
        this.clearBtn = document.getElementById('clearBtn');
        this.sampleBtn = document.getElementById('sampleBtn');
        this.resultArea = document.getElementById('resultArea');
        this.resultCard = document.getElementById('resultCard');
        this.resultTable = document.getElementById('resultTable');
        this.resultTableBody = document.getElementById('resultTableBody');
        this.statusBar = document.getElementById('statusBar');
        this.partNumberInputsContainer = document.getElementById('partNumberInputs');
        this.addPartBtn = document.getElementById('addPartBtn');
        this.clearInputBtn = document.getElementById('clearInputBtn');
        this.loading = document.getElementById('loading');
        this.fileStructureInfo = document.getElementById('fileStructureInfo');
        
        this.columnMapping = {};
        this.hasSequenceColumn = false;
        
        this.initEventListeners();
        this.checkXLSXLibrary();
    }
    
    checkXLSXLibrary() {
        if (typeof XLSX === 'undefined') {
            BOMUtils.showNotification('error', 'Excel解析库加载失败，请检查网络连接后刷新页面');
            this.selectFileBtn.disabled = true;
        }
    }
    
    initEventListeners() {
        // 文件选择事件
        this.fileInput.addEventListener('change', (e) => this.handleFileSelect(e));
        
        // 拖拽事件
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            this.dropZone.addEventListener(eventName, this.preventDefaults, false);
        });
        
        ['dragenter', 'dragover'].forEach(eventName => {
            this.dropZone.addEventListener(eventName, () => this.dropZone.classList.add('dragover'), false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            this.dropZone.addEventListener(eventName, () => this.dropZone.classList.remove('dragover'), false);
        });
        
        this.dropZone.addEventListener('drop', (e) => this.handleDrop(e), false);
        this.searchBtn.addEventListener('click', () => this.queryPart());
        this.clearBtn.addEventListener('click', () => this.clearResults());
        this.sampleBtn.addEventListener('click', () => this.showSampleData());
        
        this.addPartBtn.addEventListener('click', () => this.addPartNumberInput());
        this.clearInputBtn.addEventListener('click', () => this.clearPartNumberInputs());
        
        // 绑定第一个输入框的回车事件
        this.bindInputEvents(this.partNumberInputsContainer.querySelector('.part-number-input'));
    }
    
    preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }
    
    handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
            this.processFile(files[0]);
        }
    }
    
    processFile(file) {
        // 创建模拟的事件对象来复用 handleFileSelect 逻辑
        const mockEvent = { target: { files: [file] } };
        this.handleFileSelect(mockEvent);
    }
    
    handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const validExtensions = ['.xlsx', '.xls'];
        const fileExtension = file.name.slice(file.name.lastIndexOf('.')).toLowerCase();
        if (!validExtensions.includes(fileExtension)) {
            BOMUtils.showNotification('error', '请选择有效的Excel文件（.xlsx 或 .xls）');
            this.fileInput.value = '';
            return;
        }
        
        this.fileInfo.style.display = 'block';
        this.uploadText.textContent = '文件已就绪';
        this.fileInfo.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--success-color);flex-shrink:0;">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">已选择: ${file.name} (${BOMUtils.formatFileSize(file.size)})</span>
            </div>
        `;
        this.statusBar.innerHTML = '<span class="spinner" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:5px;"></span> 正在加载文件...';
        this.clearResults(false);
        
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                this.loadData(e.target.result);
                this.searchBtn.disabled = false;
                BOMUtils.showNotification('success', `Excel文件加载成功！共 ${this.excelData.length} 行数据`);
            } catch (error) {
                this.searchBtn.disabled = true;
                this.statusBar.innerHTML = '<span style="color:var(--danger-color);">文件加载失败</span>';
                BOMUtils.showNotification('error', `加载Excel文件时出错：${error.message}`);
            }
        };
        
        reader.onerror = () => {
            this.searchBtn.disabled = true;
            this.statusBar.innerHTML = '<span style="color:var(--danger-color);">文件读取失败</span>';
            BOMUtils.showNotification('error', '读取文件时出错');
        };
        
        reader.readAsArrayBuffer(file);
    }
    
    detectHeaderRow(rawData) {
        const maxSearchRows = Math.min(20, rawData.length);
        const requiredKeywords = ['料号'];
        const optionalKeywords = ['替代关系', '位号', '物料描述', '描述', '序号'];
        
        let bestHeaderRow = -1;
        let bestScore = 0;
        
        for (let i = 0; i < maxSearchRows; i++) {
            const row = rawData[i];
            if (!row || row.length === 0) continue;
            
            let score = 0;
            let hasRequired = false;
            
            for (const cell of row) {
                if (!cell) continue;
                const cellStr = cell.toString().trim();
                
                if (requiredKeywords.some(kw => cellStr.includes(kw))) {
                    score += 10;
                    hasRequired = true;
                }
                
                for (const kw of optionalKeywords) {
                    if (cellStr.includes(kw)) {
                        score += 5;
                        break;
                    }
                }
            }
            
            const rowStr = row.join('');
            if (rowStr.includes('历史修改') || rowStr.includes('提交时间') || 
                rowStr.includes('对白') || rowStr.includes('物料编码')) {
                score -= 20;
            }
            
            if (hasRequired && score > bestScore) {
                bestScore = score;
                bestHeaderRow = i;
            }
        }
        
        if (bestHeaderRow === -1) {
            if (rawData.length > 7) {
                const row7Str = rawData[7].join('');
                const row0Str = rawData[0].join('');
                if (row7Str.includes('料号') && row7Str.includes('替代关系')) {
                    bestHeaderRow = 7;
                } else if (row0Str.includes('料号')) {
                    bestHeaderRow = 0;
                }
            } else {
                bestHeaderRow = 0;
            }
        }
        
        return bestHeaderRow;
    }
    
    buildColumnMapping(headers) {
        const mapping = {};
        const columnAliases = {
            '料号': ['料号', '物料编码', 'part number', 'part_no', 'pn'],
            '替代关系': ['替代关系', '替代', '主料替代', 'alt_type'],
            '位号': ['位号', '位置号', 'ref des', 'reference', 'designator'],
            '物料描述': ['物料描述', '描述', '规格', '品名', '物料名称', 'description', 'desc'],
            '序号': ['序号', '项次', '行号', 'item', 'no', '序号']
        };
        
        headers.forEach((header, index) => {
            if (!header) return;
            const headerStr = header.toString().trim().toLowerCase();
            
            for (const [standardName, aliases] of Object.entries(columnAliases)) {
                for (const alias of aliases) {
                    if (headerStr.includes(alias.toLowerCase())) {
                        if (!mapping[standardName]) {
                            mapping[standardName] = index;
                        }
                        break;
                    }
                }
            }
        });
        
        return mapping;
    }
    
    loadData(arrayBuffer) {
        if (typeof XLSX === 'undefined') {
            throw new Error('Excel解析库未加载');
        }
        
        let workbook;
        try {
            workbook = XLSX.read(arrayBuffer, { type: 'array' });
        } catch (e) {
            throw new Error('无法解析Excel文件');
        }
        
        if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
            throw new Error('Excel文件中没有工作表');
        }
        
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rawData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
        
        if (rawData.length < 2) {
            throw new Error('Excel文件数据行数不足');
        }
        
        const headerRowIndex = this.detectHeaderRow(rawData);
        if (headerRowIndex === -1) {
            throw new Error('无法识别表头行');
        }
        
        const headers = rawData[headerRowIndex];
        const dataRows = rawData.slice(headerRowIndex + 1);
        
        this.columnMapping = this.buildColumnMapping(headers);
        
        if (this.columnMapping['料号'] === undefined) {
            throw new Error('Excel文件中缺少必要的列："料号"');
        }
        
        this.hasSequenceColumn = this.columnMapping['序号'] !== undefined;
        this.displayStructureInfo();
        
        this.excelData = [];
        let currentSequence = null;
        let currentMainMaterial = null;
        
        for (let i = 0; i < dataRows.length; i++) {
            const row = dataRows[i];
            if (!row || row.length === 0) continue;
            
            const partNumber = this.getCellValue(row, '料号');
            if (!partNumber) continue;
            
            const altRelation = this.getCellValue(row, '替代关系') || '';
            const position = this.getCellValue(row, '位号') || '';
            const description = this.getCellValue(row, '物料描述') || '';
            
            let sequence = '';
            if (this.hasSequenceColumn) {
                sequence = this.getCellValue(row, '序号') || '';
            }
            
            if (altRelation === '主料' || (!altRelation && sequence !== currentSequence)) {
                currentSequence = sequence;
                currentMainMaterial = {
                    partNumber: partNumber,
                    position: position,
                    description: description,
                    sequence: sequence,
                    rowIndex: headerRowIndex + i + 2
                };
            }
            
            this.excelData.push({
                序号: sequence,
                料号: partNumber,
                替代关系: altRelation || (sequence === currentSequence && partNumber !== currentMainMaterial?.partNumber ? '替代料' : ''),
                位号: position,
                物料描述: description,
                rowIndex: headerRowIndex + i + 2,
                mainMaterialInfo: altRelation === '替代料' ? currentMainMaterial : null
            });
        }
        
        this.statusBar.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px;color:var(--success-color);">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
            文件加载成功！表头在第${headerRowIndex + 1}行，共 ${this.excelData.length} 行数据
        `;
    }
    
    getCellValue(row, columnName) {
        const index = this.columnMapping[columnName];
        if (index === undefined || index >= row.length) return '';
        const value = row[index];
        return value !== undefined && value !== null ? value.toString().trim() : '';
    }
    
    displayStructureInfo() {
        const info = [];
        info.push(`<strong>检测到以下列：</strong>`);
        if (this.columnMapping['序号'] !== undefined) info.push(`序号(列${this.columnMapping['序号'] + 1})`);
        if (this.columnMapping['料号'] !== undefined) info.push(`料号(列${this.columnMapping['料号'] + 1})`);
        if (this.columnMapping['替代关系'] !== undefined) info.push(`替代关系(列${this.columnMapping['替代关系'] + 1})`);
        if (this.columnMapping['位号'] !== undefined) info.push(`位号(列${this.columnMapping['位号'] + 1})`);
        if (this.columnMapping['物料描述'] !== undefined) info.push(`物料描述(列${this.columnMapping['物料描述'] + 1})`);
        
        if (this.columnMapping['替代关系'] === undefined) {
            info.push(`<br><span class="warning-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                未检测到"替代关系"列
            </span>`);
        }
        if (this.columnMapping['位号'] === undefined) {
            info.push(`<br><span class="warning-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                未检测到"位号"列
            </span>`);
        }
        
        this.fileStructureInfo.innerHTML = `<div class="file-structure-info">${info.join(' | ')}</div>`;
    }
    
    // 添加料号输入框
    addPartNumberInput() {
        const container = this.partNumberInputsContainer;
        const newRow = document.createElement('div');
        newRow.className = 'input-group mb-2 part-number-row';
        newRow.innerHTML = `
            <input type="text" class="form-control part-number-input" placeholder="请输入料号">
            <button class="btn btn-secondary btn-add" type="button" title="添加料号">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            <button class="btn btn-danger btn-remove" type="button" title="删除">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
        `;
        container.appendChild(newRow);
        
        // 绑定事件
        const input = newRow.querySelector('.part-number-input');
        const addBtn = newRow.querySelector('.btn-add');
        const removeBtn = newRow.querySelector('.btn-remove');
        
        this.bindInputEvents(input);
        addBtn.addEventListener('click', () => this.addPartNumberInput());
        removeBtn.addEventListener('click', () => {
            newRow.style.animation = 'slideOutRow 0.3s var(--ease-smooth) forwards';
            setTimeout(() => {
                newRow.remove();
                this.updateRemoveButtons();
            }, 300);
        });
        
        this.updateRemoveButtons();
        input.focus();
    }
    
    // 绑定输入框事件
    bindInputEvents(input) {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.queryPart();
        });
    }
    
    // 更新删除按钮显示状态
    updateRemoveButtons() {
        const rows = this.partNumberInputsContainer.querySelectorAll('.part-number-row');
        rows.forEach((row, index) => {
            const removeBtn = row.querySelector('.btn-remove');
            const addBtn = row.querySelector('.btn-add');
            if (rows.length === 1) {
                removeBtn.style.display = 'none';
                addBtn.style.display = 'inline-flex';
            } else {
                removeBtn.style.display = 'inline-flex';
                // 只有最后一个显示添加按钮
                if (index === rows.length - 1) {
                    addBtn.style.display = 'inline-flex';
                } else {
                    addBtn.style.display = 'none';
                }
            }
        });
    }
    
    // 清空所有料号输入
    clearPartNumberInputs() {
        this.partNumberInputsContainer.innerHTML = `
            <div class="input-group mb-2 part-number-row">
                <input type="text" class="form-control part-number-input" placeholder="请输入料号（如：HQ134050003N0）">
                <button class="btn btn-secondary btn-add" type="button" title="添加料号">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                <button class="btn btn-danger btn-remove" type="button" title="删除" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
            </div>
        `;
        
        const input = this.partNumberInputsContainer.querySelector('.part-number-input');
        const addBtn = this.partNumberInputsContainer.querySelector('.btn-add');
        const removeBtn = this.partNumberInputsContainer.querySelector('.btn-remove');
        this.bindInputEvents(input);
        addBtn.addEventListener('click', () => this.addPartNumberInput());
        removeBtn.addEventListener('click', () => {
            if (this.partNumberInputsContainer.querySelectorAll('.part-number-row').length > 1) {
                removeBtn.closest('.part-number-row').remove();
                this.updateRemoveButtons();
            }
        });
    }
    
    // 获取所有料号
    getAllPartNumbers() {
        const inputs = this.partNumberInputsContainer.querySelectorAll('.part-number-input');
        const partNumbers = [];
        inputs.forEach(input => {
            const val = input.value.trim();
            if (val) partNumbers.push(val);
        });
        return partNumbers;
    }
    
    queryPart() {
        if (!this.excelData || this.excelData.length === 0) {
            BOMUtils.showNotification('error', '请先选择并加载Excel文件');
            return;
        }
        
        const partNumbers = this.getAllPartNumbers();
        if (partNumbers.length === 0) {
            BOMUtils.showNotification('warning', '请至少输入一个料号');
            return;
        }
        
        this.resultCard.classList.remove('d-none');
        this.loading.classList.remove('d-none');
        this.resultArea.classList.add('d-none');
        this.resultTable.classList.add('d-none');
        this.statusBar.innerHTML = '<span class="spinner" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:5px;"></span> 查询中...';
        
        setTimeout(() => {
            try {
                this.executeBatchQuery(partNumbers);
            } catch (error) {
                BOMUtils.showNotification('error', `查询出错：${error.message}`);
            } finally {
                this.loading.classList.add('d-none');
                this.resultArea.classList.remove('d-none');
                this.resultTable.classList.remove('d-none');
            }
        }, 50);
    }
    
    // 批量查询
    executeBatchQuery(partNumbers) {
        let allMatches = [];
        let notFoundList = [];
        
        partNumbers.forEach(partNumber => {
            const matches = this.excelData.filter(item => 
                item.料号.toLowerCase() === partNumber.toLowerCase()
            );
            
            if (matches.length === 0) {
                notFoundList.push(partNumber);
            } else {
                allMatches = allMatches.concat(matches);
            }
        });
        
        if (allMatches.length === 0) {
            this.resultArea.innerHTML = `
                <div class="alert alert-warning">
                    未找到以下料号：<br>
                    ${notFoundList.map(pn => `<span class="highlight">${pn}</span>`).join('<br>')}
                </div>
            `;
            this.statusBar.innerHTML = `<span style="color:var(--warning-color);">未找到料号</span>`;
            this.resultTable.classList.add('d-none');
            return;
        }
        
        this.displayBatchResults(allMatches, partNumbers, notFoundList);
        this.statusBar.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px;color:var(--success-color);">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
            查询完成，找到 ${allMatches.length} 条匹配记录${notFoundList.length > 0 ? `，${notFoundList.length} 个料号未找到` : ''}
        `;
    }
    
    displayBatchResults(matches, queryList, notFoundList) {
        // 显示未找到的料号
        let resultHTML = '';
        if (notFoundList.length > 0) {
            resultHTML += `
                <div class="alert alert-warning mb-3">
                    <strong>以下料号未找到：</strong>
                    ${notFoundList.map(pn => `<span class="highlight" style="margin-left:8px;">${pn}</span>`).join('')}
                </div>
            `;
        }
        
        // 按查询顺序分组显示
        let detailsHTML = '';
        queryList.forEach((queryPn, index) => {
            const pnMatches = matches.filter(m => m.料号.toLowerCase() === queryPn.toLowerCase());
            if (pnMatches.length > 0) {
                const match = pnMatches[0];
                detailsHTML += this.createDetailHTML(match, index + 1);
            }
        });
        
        resultHTML += detailsHTML;
        this.resultArea.innerHTML = resultHTML;
        
        // 表格显示所有结果
        this.resultTableBody.innerHTML = '';
        matches.forEach(match => {
            this.addResultRow(match, queryList.includes(match.料号) ? match.料号 : null);
        });
    }
    
    createDetailHTML(match, index) {
        const altType = match.替代关系;
        const position = match.位号 || '';
        const description = match.物料描述 || '无描述信息';
        
        let html = `<div class="result-details">`;
        html += `<h4>查询结果 ${index}</h4>`;
        
        if (match.序号) {
            html += `<div class="detail-row"><div class="detail-label">序号：</div><div class="detail-value">${match.序号}</div></div>`;
        }
        
        html += `<div class="detail-row"><div class="detail-label">查询料号：</div><div class="detail-value"><span class="highlight">${match.料号}</span></div></div>`;
        
        html += `<div class="detail-row"><div class="detail-label">替代关系：</div><div class="detail-value">${altType === '主料' ? 
            `<span class="primary-material">主料</span>` : 
            altType === '替代料' ? 
            `<span class="alternative-material">替代料</span>` : 
            altType || '-'}</div></div>`;
        
        html += `<div class="detail-row"><div class="detail-label">物料描述：</div><div class="detail-value">${description}</div></div>`;
        
        if (altType === '主料') {
            html += `<div class="detail-row"><div class="detail-label">位号：</div><div class="detail-value">${position || '无'}</div></div>`;
        } else if (altType === '替代料' && match.mainMaterialInfo) {
            html += `<div class="detail-row"><div class="detail-label">对应主料料号：</div><div class="detail-value"><span class="primary-material">${match.mainMaterialInfo.partNumber}</span></div></div>`;
            html += `<div class="detail-row"><div class="detail-label">主料位号：</div><div class="detail-value" style="color: var(--success-color); font-weight: 600;">${match.mainMaterialInfo.position || '无'}</div></div>`;
        } else {
            html += `<div class="detail-row"><div class="detail-label">位号：</div><div class="detail-value">${position || '无'}</div></div>`;
        }
        
        html += `<div class="detail-row"><div class="detail-label">Excel行号：</div><div class="detail-value">${match.rowIndex}</div></div>`;
        html += `</div>`;
        
        return html;
    }
    
    addResultRow(match, queryPartNumber) {
        const row = document.createElement('tr');
        
        row.innerHTML = `
            <td>${match.序号 || '-'}</td>
            <td>${match.料号 === queryPartNumber ? `<span class="highlight">${match.料号}</span>` : match.料号}</td>
            <td>${match.替代关系 === '主料' ? '<span class="badge badge-success">主料</span>' : match.替代关系 === '替代料' ? '<span class="badge badge-warning">替代料</span>' : match.替代关系 || '-'}</td>
            <td>${match.物料描述 || '无描述信息'}</td>
            <td>${match.位号 || '无'}</td>
            <td>${match.rowIndex}</td>
        `;
        
        this.resultTableBody.appendChild(row);
    }
    
    // executeQuery 方法已移除，使用 executeBatchQuery 替代
    
    // 原有的displayResults和displayDetailedResult方法已不再使用，改用displayBatchResults和createDetailHTML
    
    findMainMaterialBySequence(currentItem) {
        if (currentItem.序号 && this.hasSequenceColumn) {
            const sequence = currentItem.序号;
            const mainMaterial = this.excelData.find(item => 
                item.序号 === sequence && 
                item.替代关系 === '主料' &&
                item.rowIndex < currentItem.rowIndex
            );
            
            if (mainMaterial) {
                return {
                    mainPartNumber: mainMaterial.料号,
                    mainPosition: mainMaterial.位号 || '',
                    mainDescription: mainMaterial.物料描述 || ''
                };
            }
        }
        
        const currentIndex = this.excelData.findIndex(item => 
            item.料号 === currentItem.料号 && item.rowIndex === currentItem.rowIndex
        );
        
        if (currentIndex > 0) {
            for (let i = currentIndex - 1; i >= 0; i--) {
                const item = this.excelData[i];
                if (item.替代关系 === '主料') {
                    return {
                        mainPartNumber: item.料号,
                        mainPosition: item.位号 || '',
                        mainDescription: item.物料描述 || ''
                    };
                }
                if (item.替代关系 === '替代料') continue;
                if (!item.替代关系) break;
            }
        }
        
        return null;
    }
